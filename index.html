<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내화 (耐火)</title>
  <link rel="stylesheet" href="css/style.css?v=20260507b">
</head>
<body>
  <div id="wrapper">
    <canvas id="gameCanvas" width="960" height="576"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlay-intro">
        <div id="overlay-title">NAEHWA</div>
        <div id="overlay-subtitle">Boss Rush Prototype</div>
        <div id="overlay-controls-card">
          <div id="overlay-controls-title">Controls</div>
          <div id="overlay-controls-grid">
            <div class="control-label">Move</div>
            <div class="control-value">A / D</div>
            <div class="control-label">Jump</div>
            <div class="control-value">Space</div>
            <div class="control-label">Dash</div>
            <div class="control-value">Shift</div>
            <div class="control-label">Attack</div>
            <div class="control-value">Left Click</div>
            <div class="control-label">Axe / Ranged</div>
            <div class="control-value">Right Click</div>
            <div class="control-label">Burst</div>
            <div class="control-value">W</div>
            <div class="control-label">Channel</div>
            <div class="control-value">Q</div>
          </div>
        </div>
      </div>
      <div id="overlay-text"></div>
      <button id="overlay-btn"></button>
    </div>
  </div>

  <script src="js/engine.js?v=20260507b"></script>
  <script src="js/world.js?v=20260507b"></script>
  <script src="js/projectiles.js?v=20260507b"></script>
  <script src="js/player.js?v=20260507b"></script>
  <script src="js/enemies.js?v=20260507b"></script>
  <script src="js/bosses.js?v=20260507b"></script>
  <script src="js/game.js?v=20260507b"></script>
</body>
</html>
